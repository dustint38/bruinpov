<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BruinPOV | Map</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .ucla-blue { color: #2774AE; }
    .ucla-gold { color: #FFB81C; }
    .bg-ucla-blue { background-color: #2774AE; }

    #map {
      height: calc(100vh - 220px); 
      width: 100%;
      border-radius: 24px;
    }

    @media (max-width: 640px) {
      #map { height: calc(100vh - 260px); }
    }
  </style>
</head>

<body class="bg-[#0f172a] text-white antialiased">
  <main class="relative min-h-screen overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-900/20 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[10%] right-[-10%] w-[400px] h-[400px] bg-yellow-900/10 rounded-full blur-[120px]"></div>

    <!-- Header -->
    <header class="relative z-10 text-center px-6 pt-8 pb-6 border-b border-white/10">

      <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter leading-tight">
        <span class="ucla-gold">Bruin</span><span class="ucla-blue">POV</span>
      </h1>

      <p class="text-slate-400 max-w-2xl mx-auto mt-3 mb-6">
        Click on a marker and add a story!
      </p>

      <div class="flex flex-wrap justify-center gap-3">
        <button
          id="btnUCLA"
          type="button"
          class="bg-ucla-blue text-white px-7 py-3 rounded-2xl font-bold hover:scale-105 hover:bg-[#3289cc] transition-all shadow-2xl shadow-blue-500/20"
        >
          UCLA
        </button>

        <button
          id="btnWestwood"
          type="button"
          class="bg-ucla-blue text-white px-7 py-3 rounded-2xl font-bold hover:scale-105 hover:bg-[#3289cc] transition-all shadow-2xl shadow-blue-500/20"
        >
          Westwood
        </button>

      </div>
    </header>

    <!-- Map container -->
    <section class="relative z-10 px-6 py-6">
      <div class="max-w-6xl mx-auto">
        <div class="rounded-3xl overflow-hidden border border-white/10 shadow-2xl shadow-black/30">
          <div id="map"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="map.js"></script>

  <script>

//button behavior
    const VIEWS = {
      ucla: { latlng: [34.0700, -118.4441], zoom: 17 },
      westwood: { latlng: [34.0617, -118.4465], zoom: 16 }
    };

    function bindButton(id, key) {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.addEventListener("click", () => {
        if (typeof map === "undefined") return;
        const v = VIEWS[key];
        map.flyTo(v.latlng, v.zoom, { duration: 1.2 });
      });
    }

    bindButton("btnUCLA", "ucla");
    bindButton("btnWestwood", "westwood");
  </script>
</body>
<html>
    <head>
        <link rel="stylesheet" href="map.css">
         <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>

         <!-- Make sure you put this AFTER Leaflet's CSS -->
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

        <!-- Supabase -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <!-- App scripts — must come after Leaflet + Supabase above -->
        <script src="supabase.js"></script>
        <script src="map.js"></script>
        <script src="sidebar.js"></script>
        </head>
        <body>
            <div id="map"></div>
        </body>
</html>
